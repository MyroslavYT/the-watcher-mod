name: Build Mod
on: push
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
      - run: chmod +x the-watcher/gradlew
      - run: cd the-watcher && ./gradlew build
      - uses: actions/upload-artifact@v4
        with:
          name: the-watcher-jar
          path: the-watcher/build/libs/*.jar
